version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    environment:
      # We will pass the API key from the environment
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    volumes:
      - app-db:/app/app.db

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  app-db:
